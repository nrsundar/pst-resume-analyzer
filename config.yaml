# PST Resume Analyzer — Configuration
# ------------------------------------
# All settings can be overridden via CLI flags (see python analyze.py --help)

# Path to your Outlook .pst archive
pst_path: "F:\\WorkBackups\\03242022\\MyMails\\Outlook.pst"

# Where to write output files (resume_extraction.txt / .json)
output_dir: "output"

# Target role — extraction is tailored to highlight experience relevant to this position.
# Can also be set with --role "Sr.SA Manager" on the command line.
# Leave blank for general resume extraction.
role: ""

# Provider: "anthropic" (direct API key) or "bedrock" (AWS account)
# See README for setup instructions for each provider.
provider: "anthropic"

# AWS region for Bedrock (only used when provider is "bedrock")
# Supported regions: us-east-1, us-west-2, eu-west-1, ap-northeast-1
aws_region: "us-east-1"

# AI model to use. Always pin to the latest available model for best results.
# The same friendly name works for both providers — the tool maps it automatically.
# claude-opus-4-6            → highest quality, most expensive
# claude-sonnet-4-6          → best balance of quality and cost
# claude-haiku-4-5-20251001  → fastest, cheapest (~$6-9 for 85k emails)
model: "claude-opus-4-6"

# Number of emails sent per API call
batch_size: 50

# Max characters of email body to include (keeps token cost low)
max_body_chars: 500

# Folders to skip entirely (case-insensitive substring match against folder name)
skip_folders:
  - deleted items
  - spam
  - junk
  - trash
  - sent items
  - outbox
  - drafts
  - rss feeds
  - sync issues
  - loft
  - reinvent
  - ako
  - travels & expenses
  - expenses
  - mac2pc
